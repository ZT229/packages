name: Update Branch with Upstream Changes

on:
  schedule:
    - cron: "0 2 * * *"  # 每天上午 02:00
  push:
    branches:
      - master  # 当你向 master 分支推送时触发
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # 获取所有历史记录

      - name: Set up Git
        run: |
          git config user.name "ZT229"  # 替换为你的 GitHub 用户名
          git config user.email "2432702069@qq.com"  # 替换为你的邮箱

      - name: Add Upstream Remote
        run: |
          if ! git remote get-url upstream; then
            git remote add upstream https://github.com/immortalwrt/packages.git  # 替换为原始仓库的 URL
          fi

      - name: Fetch Upstream Changes
        run: git fetch upstream

      - name: Checkout Your Branch
        run: |
          git checkout self  # 替换为你的分支名称

      - name: Ignore .github Directory Changes
        run: |
          # 忽略 .github 目录的更改
          git update-index --assume-unchanged .github

      - name: Merge Upstream Changes into Your Branch
        run: |
          # 合并上游分支的更改
          git merge upstream/master --no-commit || echo "Merge conflicts detected."

      - name: Commit Merged Changes
        run: |
          # 提交合并后的更改（如果有更改）
          git commit -m "Merge upstream/master into self" || echo "No changes to commit."

      - name: Push Changes
        run: |
          git push origin self  # 推送到你的分支
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 使用 GitHub 提供的 token 进行身份验证
